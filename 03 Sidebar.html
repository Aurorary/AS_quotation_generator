<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 12px; color: #222; padding: 10px; background: #fff; }

  h2 { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #1a1a1a; }
  .section-title { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase;
                   letter-spacing: 0.5px; margin: 12px 0 6px; border-bottom: 1px solid #eee; padding-bottom: 3px; }

  label { display: block; font-size: 11px; font-weight: bold; color: #222; margin-bottom: 2px; }
  input[type=text], input[type=email], textarea, select {
    width: 100%; padding: 5px 7px; border: 1px solid #ccc; border-radius: 3px;
    font-size: 12px; margin-bottom: 6px; font-family: Arial, sans-serif;
  }
  textarea { resize: vertical; min-height: 48px; }
  input[type=text]:focus, input[type=email]:focus, textarea:focus, select:focus {
    outline: none; border-color: #4a90d9;
  }
  input[readonly] { background: #f5f5f5; color: #666; }

  .row { display: flex; gap: 6px; align-items: flex-start; }
  .row label { white-space: nowrap; }
  .half { flex: 1; }

  /* Catalogue search + list */
  #catalogueSearch { margin-bottom: 4px; }
  #catalogueList { width: 100%; height: 110px; font-size: 11px; border: 1px solid #ccc;
                   border-radius: 3px; margin-bottom: 4px; }
  #catalogueList option { padding: 3px 5px; }
  #addItemBtn { width: 100%; padding: 5px; background: #4a90d9; color: #fff; border: none;
                border-radius: 3px; cursor: pointer; font-size: 11px; margin-bottom: 10px; }
  #addItemBtn:hover { background: #357abd; }

  /* Items table */
  table#itemsTable { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 4px; }
  table#itemsTable th { background: #222; color: #fff; padding: 4px 4px; text-align: left; }
  table#itemsTable th.c { text-align: center; }
  table#itemsTable th.r { text-align: right; }
  table#itemsTable td { border-bottom: 1px solid #eee; padding: 3px 4px; vertical-align: top; }
  table#itemsTable td input { width: 100%; padding: 2px 4px; font-size: 11px; border: 1px solid #ddd;
                               border-radius: 2px; text-align: right; }
  table#itemsTable td.r { text-align: right; }
  table#itemsTable td.c { text-align: center; }
  .cost-input { background: #fffbe6; border-color: #f0c040 !important; }
  .remove-btn { background: none; border: none; color: #c00; cursor: pointer; font-size: 13px;
                line-height: 1; padding: 0 2px; }

  /* Totals */
  .totals-row { display: flex; justify-content: flex-end; gap: 20px; font-size: 12px;
                margin: 4px 0 4px; }
  .totals-row .total-label { color: #555; }
  .totals-row .total-value { font-weight: bold; min-width: 80px; text-align: right; }
  .charge-group-totals { margin: 0 0 10px; border-top: 1px solid #eee; padding-top: 4px; }

  /* Generate button */
  #generateBtn { width: 100%; padding: 9px; background: #2b7d2b; color: #fff; border: none;
                 border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 4px; }
  #generateBtn:hover:not(:disabled) { background: #236023; }
  #generateBtn:disabled { background: #999; cursor: not-allowed; }

  /* Status / result */
  #status { margin-top: 8px; font-size: 11px; min-height: 18px; }
  #status.error { color: #c00; }
  #status.success { color: #2b7d2b; }
  #status.info { color: #555; }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc;
             border-top-color: #4a90d9; border-radius: 50%; animation: spin 0.7s linear infinite;
             vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .revision-field { display: none; }

  /* Two-column header layout */
  .header-cols { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 4px; }
  .header-cols .col { flex: 1; min-width: 0; }
  .header-cols .col-narrow { flex: 0 0 38%; min-width: 0; }
  .header-cols .col-wide   { flex: 1; min-width: 0; }
  .col-divider { border-left: 1px solid #eee; margin: 0 2px; }
</style>
</head>
<body>


<!-- ── QUOTE DETAILS + CUSTOMER DETAILS side by side ──── -->
<div class="section-title" style="margin-top:0;">Quote &amp; Customer Details</div>

<div class="header-cols">

  <!-- LEFT: Quote Details -->
  <div class="col-narrow">
    <label style="font-size:10px; font-weight:bold; color:#111; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:4px;">Quote Details</label>

    <label>Location</label>
    <select id="locationSelect" onchange="onLocationChange()"></select>

    <label>Quote Number</label>
    <input type="text" id="quoteNumberDisplay" readonly>

    <label style="display:flex; align-items:center; gap:6px; margin-bottom:6px; cursor:pointer;">
      <input type="checkbox" id="isRevision" onchange="onRevisionToggle()"> Is this a revision?
    </label>

    <div class="revision-field" id="revisionField">
      <label>Revision No.</label>
      <input type="text" id="revisionQuoteNumber">
    </div>

    <label>Date</label>
    <input type="text" id="quoteDate" readonly>
  </div>

  <div class="col-divider"></div>

  <!-- RIGHT: Customer Details -->
  <div class="col-wide">
    <label style="font-size:10px; font-weight:bold; color:#111; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:4px;">Customer Details</label>

    <label>Company Name *</label>
    <input type="text" id="customerName" placeholder="e.g. Aquilius Investment Partners">

    <label>Work Description</label>
    <input type="text" id="workDesc" placeholder="e.g. Door access installation">

    <label>Address</label>
    <textarea id="customerAddress" placeholder="Full address (multi-line OK)" style="min-height:56px;"></textarea>

    <label>Email (for PDF delivery) *</label>
    <input type="email" id="customerEmail" placeholder="customer@example.com">

    <label>CC Email (optional)</label>
    <input type="email" id="ccEmail" placeholder="cc@example.com">
  </div>

</div>

<!-- ── ITEMS ──────────────────────────────────────────── -->
<div class="section-title">Items</div>

<label>Search Catalogue</label>
<input type="text" id="catalogueSearch" placeholder="Type to filter…" oninput="filterCatalogue()">
<select id="catalogueList" size="7"></select>
<button id="addItemBtn" onclick="addSelectedItem()">+ Add Item</button>

<!-- Items table -->
<table id="itemsTable">
  <thead>
    <tr>
      <th style="width:28%">Description</th>
      <th style="width:9%">Cat</th>
      <th style="width:8%">Type</th>
      <th class="c" style="width:6%">Qty</th>
      <th class="r" style="width:12%">Cost Price</th>
      <th class="r" style="width:12%">Unit Price</th>
      <th class="r" style="width:12%">Total</th>
      <th style="width:5%"></th>
    </tr>
  </thead>
  <tbody id="itemsBody">
    <tr id="emptyRow"><td colspan="8" style="color:#aaa; text-align:center; padding:8px;">No items added</td></tr>
  </tbody>
</table>

<div id="chargeGroupTotals" class="charge-group-totals" style="display:none;"></div>
<div class="totals-row">
  <span class="total-label">Cost Total:</span>
  <span class="total-value" id="costTotal">MYR 0.00</span>
</div>
<div class="totals-row">
  <span class="total-label">Quoted Total:</span>
  <span class="total-value" id="quotedTotal" style="font-size:13px; color:#2b7d2b;">MYR 0.00</span>
</div>

<button id="generateBtn" onclick="submitQuotation()">Generate Quotation</button>
<div id="status" class="info"></div>

<!-- ── PREVIEW PANEL ──────────────────────────────────── -->
<div id="previewPanel" style="display:none; margin-top:10px;">
  <div style="display:flex; gap:6px; margin-bottom:8px;">
    <button id="backBtn" onclick="backToForm()" style="flex:1; padding:8px; background:#888; color:#fff; border:none; border-radius:4px; font-size:12px; cursor:pointer;">← Back & Edit</button>
    <button id="confirmBtn" onclick="confirmQuotation()" style="flex:2; padding:8px; background:#2b7d2b; color:#fff; border:none; border-radius:4px; font-size:13px; font-weight:bold; cursor:pointer;">Confirm & Send</button>
  </div>
  <iframe id="previewFrame" style="width:100%; height:600px; border:1px solid #ccc; border-radius:3px;"></iframe>
</div>

<script>
// ── State ────────────────────────────────────────────────────
var allCatalogueItems = [];
var addedItems = [];          // { id, category, description, qty, unitPrice, costPrice, lineTotal }
var locations = [];
var nextItemId = 1;

// ── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  setStatus('Loading…', 'info');
  google.script.run
    .withSuccessHandler(onInitialData)
    .withFailureHandler(onError)
    .getInitialData();

  google.script.run
    .withSuccessHandler(onCatalogueLoaded)
    .withFailureHandler(onError)
    .getCatalogueItems();
});

function onInitialData(data) {
  if (data.selectedRow) window._selectedRow = data.selectedRow;
  locations = data.locations || [];
  populateLocationDropdown(locations, data.defaultLocation);
  document.getElementById('quoteNumberDisplay').value = data.quoteNumber || '';
  document.getElementById('quoteDate').value = data.today || '';

  // Pre-fill if a revision row was selected
  if (data.selectedRow && data.selectedRow.quoteNumber) {
    document.getElementById('isRevision').checked = true;
    onRevisionToggle();
    document.getElementById('revisionQuoteNumber').value = buildRevisionNumber(data.selectedRow.quoteNumber);
    // Set location to match existing quote
    if (data.selectedRow.locationCode) {
      document.getElementById('locationSelect').value = data.selectedRow.locationCode;
    }
    document.getElementById('customerName').value = data.selectedRow.customer || '';
  }

  setStatus('', '');
}

function onCatalogueLoaded(items) {
  allCatalogueItems = items || [];
  renderCatalogueList(allCatalogueItems);
}

// ── Location dropdown ────────────────────────────────────────
function populateLocationDropdown(locs, defaultCode) {
  var sel = document.getElementById('locationSelect');
  sel.innerHTML = '';
  locs.forEach(function(l) {
    var opt = document.createElement('option');
    opt.value = l.code;
    // Parse first line of fullAddress as location name
    var lines = l.fullAddress.split('\n');
    opt.textContent = lines[0] + ' (' + l.code + ')';
    sel.appendChild(opt);
  });
  if (defaultCode) sel.value = defaultCode;
}

function onLocationChange() {
  if (document.getElementById('isRevision').checked) return;
  var code = document.getElementById('locationSelect').value;
  document.getElementById('quoteNumberDisplay').value = 'Loading…';
  google.script.run
    .withSuccessHandler(function(qn) {
      document.getElementById('quoteNumberDisplay').value = qn;
    })
    .withFailureHandler(onError)
    .getNextQuoteNumber(code);
}

// ── Revision ─────────────────────────────────────────────────
function onRevisionToggle() {
  var checked = document.getElementById('isRevision').checked;
  document.getElementById('revisionField').style.display = checked ? 'block' : 'none';
  if (!checked) {
    // Restore auto-generated number
    onLocationChange();
  }
}

function buildRevisionNumber(existing) {
  // Strip existing revision suffix, then increment
  var match = existing.match(/^(.*)\s+rev(\d+)$/i);
  if (match) {
    return match[1] + ' rev' + (parseInt(match[2], 10) + 1);
  }
  // No existing revision
  var clean = existing.replace(/\s+rev\d+$/i, '').trim();
  return clean + ' rev1';
}

// ── Catalogue ────────────────────────────────────────────────
function renderCatalogueList(items) {
  var list = document.getElementById('catalogueList');
  list.innerHTML = '';
  if (items.length === 0) {
    var opt = document.createElement('option');
    opt.disabled = true;
    opt.textContent = '— no items found —';
    list.appendChild(opt);
    return;
  }
  items.forEach(function(item) {
    var opt = document.createElement('option');
    opt.value = allCatalogueItems.indexOf(item);
    opt.textContent = '[' + item.category + '] ' + (item.brand ? item.brand + ' — ' : '') + item.description.split('\n')[0];
    list.appendChild(opt);
  });
}

function filterCatalogue() {
  var q = document.getElementById('catalogueSearch').value.toLowerCase().trim();
  if (!q) {
    renderCatalogueList(allCatalogueItems);
    return;
  }
  var filtered = allCatalogueItems.filter(function(item) {
    return (item.category + ' ' + item.brand + ' ' + item.description).toLowerCase().indexOf(q) !== -1;
  });
  renderCatalogueList(filtered);
}

function addSelectedItem() {
  var list = document.getElementById('catalogueList');
  var selectedOpt = list.options[list.selectedIndex];
  if (!selectedOpt || selectedOpt.disabled) return;

  var idx = parseInt(selectedOpt.value, 10);
  var item = allCatalogueItems[idx];
  if (!item) return;

  // Use catalogue's pre-calculated price if available, otherwise compute from cost (30% markup)
  var unitPrice = item.price > 0 ? item.price : computeSellingPrice(item.costPrice, 30);

  addedItems.push({
    id: nextItemId++,
    category: item.category,
    chargeType: item.chargeType || '',
    description: item.description,
    isCustom: item.brand === 'Custom Item',
    subRows: item.subRows || [],
    extraPriceRows: item.extraPriceRows || [],
    qty: 1,
    unitPrice: unitPrice,
    costPrice: item.costPrice,
    cataloguePrice: item.price,
    lineTotal: unitPrice
  });

  renderItemsTable();
  recalcTotals();
}

// ── Items table ───────────────────────────────────────────────
function renderItemsTable() {
  var tbody = document.getElementById('itemsBody');
  tbody.innerHTML = '';

  if (addedItems.length === 0) {
    var tr = document.createElement('tr');
    tr.id = 'emptyRow';
    tr.innerHTML = '<td colspan="8" style="color:#aaa; text-align:center; padding:8px;">No items added</td>';
    tbody.appendChild(tr);
    return;
  }

  addedItems.forEach(function(item) {
    var tr = document.createElement('tr');
    var descShort = item.description.split('\n')[0];
    var typeLabel = item.chargeType || '—';
    var typeColor = item.chargeType === 'Monthly' ? '#0066cc' : (item.chargeType === 'One-Off' ? '#555' : '#aaa');
    var descCell = item.isCustom
      ? '<td><input type="text" value="' + escHtml(descShort) + '" placeholder="Enter description…" style="width:100%; padding:2px 4px; font-size:11px; border:1px solid #ddd; border-radius:2px;" onchange="onDescChange(' + item.id + ', this.value)"></td>'
      : '<td title="' + escHtml(item.description) + '">' + escHtml(descShort) + '</td>';
    var costCell = item.isCustom
      ? '<td class="r"><input type="number" min="0" step="0.01" value="' + (item.costPrice || 0).toFixed(2) + '" class="cost-input" style="width:68px;" placeholder="Cost…" onchange="onCostChange(' + item.id + ', this.value)" title="Enter cost price — unit price auto-calculates at 30% margin"></td>'
      : '<td class="r" style="color:#aaa; font-size:10px;">' + (item.costPrice > 0 ? formatMyr(item.costPrice) : '—') + '</td>';
    tr.innerHTML =
      descCell +
      '<td style="font-size:10px; color:#666;">' + escHtml(item.category) + '</td>' +
      '<td style="font-size:10px; color:' + typeColor + ';">' + escHtml(typeLabel) + '</td>' +
      '<td class="c"><input type="number" min="1" value="' + item.qty + '" style="width:55px; text-align:center;" onchange="onQtyChange(' + item.id + ', this.value)"></td>' +
      costCell +
      '<td class="r"><input type="number" min="0" step="0.01" value="' + item.unitPrice.toFixed(2) + '" style="width:68px;" onchange="onPriceChange(' + item.id + ', this.value)"></td>' +
      '<td class="r">' + formatMyr(item.lineTotal) + '</td>' +
      '<td class="c"><button class="remove-btn" onclick="removeItem(' + item.id + ')" title="Remove">✕</button></td>';
    tbody.appendChild(tr);
  });
}

function onQtyChange(id, val) {
  var item = addedItems.find(function(i) { return i.id === id; });
  if (!item) return;
  item.qty = Math.max(1, parseInt(val, 10) || 1);
  item.lineTotal = round2(item.qty * item.unitPrice);
  renderItemsTable();
  recalcTotals();
}

function onPriceChange(id, val) {
  var item = addedItems.find(function(i) { return i.id === id; });
  if (!item) return;
  item.unitPrice = parseFloat(val) || 0;
  item.lineTotal = round2(item.qty * item.unitPrice);
  renderItemsTable();
  recalcTotals();
}

function removeItem(id) {
  addedItems = addedItems.filter(function(i) { return i.id !== id; });
  renderItemsTable();
  recalcTotals();
}

function onDescChange(id, val) {
  var item = addedItems.find(function(i) { return i.id === id; });
  if (!item) return;
  item.description = val.trim();
}

function onCostChange(id, val) {
  var item = addedItems.find(function(i) { return i.id === id; });
  if (!item) return;
  item.costPrice = parseFloat(val) || 0;
  item.unitPrice = computeSellingPrice(item.costPrice, 30);
  item.lineTotal = round2(item.qty * item.unitPrice);
  renderItemsTable();
  recalcTotals();
}

function computeSellingPrice(costPrice, markupPct) {
  if (!costPrice) return 0;
  var divisor = 1 - (markupPct / 100);
  var raw = costPrice / divisor;
  return Math.ceil(raw / 10) * 10;
}

// ── Totals ───────────────────────────────────────────────────
function recalcTotals() {
  var quotedSum = 0, costSum = 0;
  var groups = {};  // chargeType → quoted sum
  addedItems.forEach(function(item) {
    quotedSum += item.lineTotal;
    costSum += round2(item.costPrice * item.qty);
    var ct = item.chargeType || 'Other';
    groups[ct] = (groups[ct] || 0) + item.lineTotal;
    (item.subRows || []).filter(function(s) { return s.price > 0; }).forEach(function(sub) {
      quotedSum += sub.price * item.qty;
      costSum += round2(sub.costPrice * item.qty);
      var sct = sub.chargeType || 'Other';
      groups[sct] = (groups[sct] || 0) + sub.price * item.qty;
    });
    (item.extraPriceRows || []).forEach(function(ep) {
      quotedSum += ep.price * item.qty;
      costSum += round2(ep.costPrice * item.qty);
      var ect = ep.chargeType || 'Other';
      groups[ect] = (groups[ect] || 0) + ep.price * item.qty;
    });
  });
  document.getElementById('quotedTotal').textContent = 'MYR ' + formatMyr(quotedSum);
  document.getElementById('costTotal').textContent   = 'MYR ' + formatMyr(costSum);

  // Render charge-type breakdown
  var groupEl = document.getElementById('chargeGroupTotals');
  var keys = Object.keys(groups);
  if (keys.length <= 1) {
    groupEl.style.display = 'none';
    groupEl.innerHTML = '';
  } else {
    var html = '';
    keys.forEach(function(ct) {
      var color = ct === 'Monthly' ? '#0066cc' : '#555';
      html += '<div class="totals-row" style="margin-bottom:2px;">' +
        '<span class="total-label" style="color:' + color + ';">' + escHtml(ct) + ':</span>' +
        '<span class="total-value" style="color:' + color + ';">MYR ' + formatMyr(groups[ct]) + '</span>' +
        '</div>';
    });
    groupEl.innerHTML = html;
    groupEl.style.display = 'block';
  }
}

// ── Build payload ─────────────────────────────────────────────
function buildPayload() {
  var customerName = document.getElementById('customerName').value.trim();
  if (!customerName) { setStatus('Please enter a company name.', 'error'); return null; }
  var customerEmail = document.getElementById('customerEmail').value.trim();
  if (!customerEmail) { setStatus('Please enter a customer email address.', 'error'); return null; }
  if (addedItems.length === 0) { setStatus('Please add at least one item.', 'error'); return null; }

  var isRevision = document.getElementById('isRevision').checked;
  var quoteNumber = isRevision
    ? document.getElementById('revisionQuoteNumber').value.trim()
    : document.getElementById('quoteNumberDisplay').value.trim();
  if (!quoteNumber) { setStatus('Quote number is missing.', 'error'); return null; }

  var quotedSum = 0, costSum = 0;
  addedItems.forEach(function(item) {
    quotedSum += item.lineTotal;
    costSum += round2(item.costPrice * item.qty);
    (item.subRows || []).filter(function(s) { return s.price > 0; }).forEach(function(s) {
      quotedSum += s.price * item.qty;
      costSum += round2(s.costPrice * item.qty);
    });
    (item.extraPriceRows || []).forEach(function(ep) {
      quotedSum += ep.price * item.qty;
      costSum += round2(ep.costPrice * item.qty);
    });
  });

  var rowIndex = null;
  if (window._selectedRow) rowIndex = window._selectedRow.rowIndex;

  return {
    rowIndex: rowIndex,
    locationCode: document.getElementById('locationSelect').value,
    quoteNumber: quoteNumber,
    isRevision: isRevision,
    quoteDate: document.getElementById('quoteDate').value,
    customerName: customerName,
    work: document.getElementById('workDesc').value.trim(),
    customerAddress: document.getElementById('customerAddress').value.trim(),
    customerEmail: document.getElementById('customerEmail').value.trim(),
    ccEmail: document.getElementById('ccEmail').value.trim(),
    items: addedItems.map(function(item) {
      return {
        description: item.description,
        subRows: item.subRows || [],
        extraPriceRows: item.extraPriceRows || [],
        category: item.category,
        chargeType: item.chargeType || '',
        qty: item.qty,
        unitPrice: item.unitPrice,
        catalogueCostPrice: item.costPrice,
        lineTotal: item.lineTotal
      };
    }),
    quotedPrice: round2(quotedSum),
    costPrice: round2(costSum)
  };
}

// ── Step 1: Preview ───────────────────────────────────────────
function submitQuotation() {
  var payload = buildPayload();
  if (!payload) return;

  document.getElementById('generateBtn').disabled = true;
  setStatus('<span class="spinner"></span> Building preview…', 'info');

  google.script.run
    .withSuccessHandler(onPreviewDone)
    .withFailureHandler(onGenerateError)
    .previewQuotation(payload);
}

function onPreviewDone(result) {
  document.getElementById('generateBtn').disabled = false;
  if (!result.success) { setStatus('Error: ' + (result.error || 'Unknown error'), 'error'); return; }

  // Show preview panel, hide form elements
  document.getElementById('previewPanel').style.display = 'block';
  document.getElementById('generateBtn').style.display = 'none';
  setStatus('Review the quotation below, then confirm to send.', 'info');

  // Load HTML into iframe via blob URL
  var blob = new Blob([result.html], { type: 'text/html' });
  var url = URL.createObjectURL(blob);
  document.getElementById('previewFrame').src = url;
}

// ── Step 2: Confirm & Send ────────────────────────────────────
function confirmQuotation() {
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('backBtn').disabled = true;
  setStatus('<span class="spinner"></span> Saving and sending…', 'info');

  google.script.run
    .withSuccessHandler(onConfirmDone)
    .withFailureHandler(onGenerateError)
    .confirmQuotation();
}

function onConfirmDone(result) {
  document.getElementById('confirmBtn').disabled = false;
  document.getElementById('backBtn').disabled = false;
  if (result.success) {
    setStatus('✓ Sent! <a href="' + result.pdfUrl + '" target="_blank">Open PDF</a>', 'success');
    document.getElementById('confirmBtn').style.display = 'none';
    document.getElementById('backBtn').textContent = '← Start New';
    document.getElementById('backBtn').onclick = function() { location.reload(); };
  } else {
    setStatus('Error: ' + (result.error || 'Unknown error'), 'error');
  }
}

// ── Back to form ──────────────────────────────────────────────
function backToForm() {
  document.getElementById('previewPanel').style.display = 'none';
  document.getElementById('generateBtn').style.display = 'block';
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('confirmBtn').disabled = false;
  document.getElementById('backBtn').disabled = false;
  setStatus('', '');
}

function onGenerateError(err) {
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('confirmBtn') && (document.getElementById('confirmBtn').disabled = false);
  setStatus('Error: ' + err.message, 'error');
}

function onError(err) {
  setStatus('Error: ' + (err.message || err), 'error');
}

// ── Helpers ──────────────────────────────────────────────────
function setStatus(html, cls) {
  var el = document.getElementById('status');
  el.innerHTML = html;
  el.className = cls;
}

function formatMyr(val) {
  var n = parseFloat(val) || 0;
  return n.toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function round2(v) {
  return Math.round(v * 100) / 100;
}

function escHtml(str) {
  return (str || '').toString()
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

</script>
